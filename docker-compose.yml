services:
  db:
    image: postgres:16-alpine
    container_name: moto-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: moto
      POSTGRES_PASSWORD: moto
      POSTGRES_DB: moto
    ports:
      - "5432:5432"
    volumes:
      - moto-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moto -d moto"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  moto-pgdata:
