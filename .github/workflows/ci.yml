name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  DATABASE_URL: postgresql://moto:moto@localhost:5432/moto?schema=public
  DIRECT_URL: postgresql://moto:moto@localhost:5432/moto?schema=public

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: moto
          POSTGRES_PASSWORD: moto
          POSTGRES_DB: moto
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U moto -d moto"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Migrate database
        run: npm run db:deploy

      - name: Test
        run: npm run test
